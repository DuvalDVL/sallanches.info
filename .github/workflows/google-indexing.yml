name: Google Indexing API

on:
  push:
    branches:
      - main  # (ou 'master', selon le nom de ta branche)

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du site
        uses: actions/checkout@v4

      - name: Prévenir Google via l'API d'Indexation
        uses: robingenz/action-google-indexing@v1.0.2
        with:
          # L'adresse exacte de ta propriété Search Console
          siteUrl: 'https://sallanches.info/'
          # Ta clé secrète bien à l'abri
          gcpServiceAccountKey: ${{ secrets.INDEXING_API_KEY }}
