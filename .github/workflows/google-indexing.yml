name: API Indexation (Google & Bing)

on:
  workflow_run:
    workflows: ["Publication matinale des articles", "pages-build-deployment"]
    types:
      - completed

jobs:
  index:
    # On vérifie que le site a bien été mis en ligne avant de prévenir les moteurs
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du site
        uses: actions/checkout@v4
        
      - name: Prévenir Google via l'API d'Indexation
        uses: robingenz/action-google-indexing@v1.0.2
        with:
          siteUrl: 'https://sallanches.info/'
          gcpServiceAccountKey: ${{ secrets.INDEXING_API_KEY }}

      - name: Prévenir Bing (Ping instantané)
        # Cette commande simple alerte Bing que le sitemap a été mis à jour
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://sallanches.info/sitemap.xml"
