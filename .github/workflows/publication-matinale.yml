name: Publication matinale des articles

on:
  schedule:
    # L'heure des serveurs GitHub est en UTC (Londres). 
    # 04:00 UTC correspond à 06:00 en France (heure d'été) ou 05:00 (heure d'hiver).
    - cron: '0 4 * * *'
  workflow_dispatch: # Permet aussi de déclencher manuellement via un bouton si besoin

permissions:
  contents: read
  pages: write

jobs:
  rebuild-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Lancer la reconstruction de GitHub Pages
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
