title: "Sallanches Info - L'actualité locale au Pays du Mont-Blanc"
description: "L'actualité en direct de Sallanches, Passy, Saint-Gervais et Magland. Infos, économie, agenda et faits divers. 100% gratuit, sans abonnement."
baseurl: ""
url: "https://sallanches.info"
locale: fr_FR
lang: fr

# Auteur
author:
  name: "La redaction"
  email: "contact@sallanches.info"

# Reseaux sociaux
social:
  facebook: "https://facebook.com/sallanchesinfo"
  twitter: "https://x.com/sallanchesinfo"
  linkedin: "https://linkedin.com/company/sallanchesinfo"

# Contact
contact:
  email: "contact@sallanches.info"

# Permalink - utilise la categorie du dossier _posts/[categorie]/
permalink: /:categories/:title/

# Excerpts
excerpt_separator: "<!--more-->"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Layout par defaut pour les articles
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
