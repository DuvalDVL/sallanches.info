title: "Sallanches Info - L'actualité locale au Pays du Mont-Blanc"
description: "L'actualité en direct de Sallanches, Passy, Saint-Gervais, Megève et Magland. Infos, économie, agenda et faits divers. 100% gratuit, sans abonnement."
baseurl: ""
url: "https://sallanches.info"
locale: fr_FR
lang: fr

author:
  name: "La rédaction"
  email: "contact@sallanches.info"

social:
  facebook: "https://facebook.com/sallanchesinfo"
  twitter: "https://x.com/sallanchesinfo"
  linkedin: "https://linkedin.com/company/sallanchesinfo"

contact:
  email: "contact@sallanches.info"

permalink: /:categories/:title/
excerpt_separator: ""

plugins:
  - jekyll-feed
  - jekyll-paginate-v2

pagination:
  enabled: true
  per_page: 12
  permalink: '/page/:num/'
  title: ':title - Page :num'
  sort_reverse: true

feed:
  posts_limit: 50

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
