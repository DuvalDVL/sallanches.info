{% assign share_url = page.url | absolute_url %}
{% assign share_title = page.title | uri_escape %}
{% assign share_desc = page.description | uri_escape %}

<div class="share-row" role="group" aria-label="Partager cet article">
  <span class="share-label">Partager</span>

  <a class="share-btn"
     href="https://www.facebook.com/sharer/sharer.php?u={{ share_url }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Partager sur Facebook">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
    </svg>
    Facebook
  </a>

  <a class="share-btn"
     href="https://x.com/intent/tweet?url={{ share_url }}&text={{ share_title }}&via=sallanchesinfo"
     target="_blank" rel="noopener noreferrer"
     aria-label="Partager sur X (Twitter)">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
    X
  </a>

  <a class="share-btn"
     href="https://www.linkedin.com/shareArticle?mini=true&url={{ share_url }}&title={{ share_title }}&summary={{ share_desc }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Partager sur LinkedIn">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
      <circle cx="4" cy="4" r="2"/>
    </svg>
    LinkedIn
  </a>

  <a class="share-btn"
     href="https://wa.me/?text={{ share_title }}%20{{ share_url }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Partager sur WhatsApp">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.122 1.523 5.855L.057 23.882l6.174-1.619A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.848 0-3.573-.5-5.063-1.373l-.363-.214-3.664.962.977-3.568-.236-.377A9.955 9.955 0 012 12c0-5.514 4.486-10 10-10s10 4.486 10 10-4.486 10-10 10z"/>
    </svg>
    WhatsApp
  </a>

</div>
